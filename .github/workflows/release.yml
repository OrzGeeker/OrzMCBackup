name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - run: ./gradlew :core:portalBundle --no-daemon -Pversion=${{ env.VERSION }} -Psigning.keyId=${{ secrets.SIGNING_KEY_ID }} -Psigning.key=${{ secrets.SIGNING_KEY }} -Psigning.password=${{ secrets.SIGNING_PASSWORD }}
      - name: Upload bundle to Central Portal
        env:
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          CENTRAL_PORTAL_UPLOAD_URL: ${{ secrets.CENTRAL_PORTAL_UPLOAD_URL }}
        run: |
          curl -f -X POST -H "Authorization: Bearer ${CENTRAL_TOKEN}" -H "Content-Type: application/zip" --data-binary @core/build/portal-bundle.zip "${CENTRAL_PORTAL_UPLOAD_URL}"
      - run: ./gradlew --stop
